<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racer Game</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background: #252525;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.8);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="450" height="580"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let gameState = "LOBBY";
        let isSettingOpen = false;
        let isTipsOpen = false; 

        let musicVolume = 0.6; 
        let sfxVolume = 0.5;

        let player = {
            x: 200,
            y: 460, 
            width: 50,
            height: 85,
            speed: 7,
            color: "#00a8ff"
        };

        const colorOptions = [
            { name: "BLUE", hex: "#00a8ff" },
            { name: "RED", hex: "#e84118" },
            { name: "WHITE", hex: "#f5f6fa" },
            { name: "BLACK", hex: "#2f3640" }, 
            { name: "GREEN", hex: "#4cd137" },
            { name: "YELLOW", hex: "#fbc531" },
            { name: "PINK", hex: "#ff7bab" },    
            { name: "CYAN", hex: "#00d2d3" },    
            { name: "GREY", hex: "#7f8c8d" },    
            { name: "PURPLE", hex: "#9b59b6" }   
        ];
        let selectedColorIndex = 0;

        let enemy = {
            x: Math.random() * (canvas.width - 50),
            y: -90,
            width: 50,
            height: 85,
            speed: 4,
            color: "#ff4757"
        };

        let score = 0;
        let roadOffset = 0;
        let roadSpeed = 6;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineOsc = null;
        let engineGainNode = null; 
        let musicInterval = null;

        const melody = [261.63, 329.63, 392.00, 329.63, 293.66, 349.23, 440.00, 349.23];
        let melodyIndex = 0;

        function startEngineSound() {
            if (sfxVolume === 0 || engineOsc) return;
            try {
                engineOsc = audioCtx.createOscillator();
                engineGainNode = audioCtx.createGain();
                engineOsc.type = 'sawtooth';
                engineOsc.frequency.setValueAtTime(50, audioCtx.currentTime); 
                engineGainNode.gain.setValueAtTime(sfxVolume * 0.25, audioCtx.currentTime); 
                engineOsc.connect(engineGainNode);
                engineGainNode.connect(audioCtx.destination);
                engineOsc.start();
            } catch(e){}
        }

        function updateEnginePitch() {
            if (engineOsc && sfxVolume > 0) {
                let pitch = 50 + (roadSpeed * 5);
                engineOsc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
            }
        }

        function updateEngineVolume() {
            if (engineGainNode) {
                engineGainNode.gain.setValueAtTime(sfxVolume * 0.25, audioCtx.currentTime);
            } else if (sfxVolume > 0 && gameState === "PLAYING" && !isSettingOpen && !isTipsOpen) {
                startEngineSound();
            }
        }

        function stopEngineSound() {
            if (engineOsc) {
                try { engineOsc.stop(); } catch(e){}
                engineOsc = null;
                engineGainNode = null;
            }
        }

        function startMusic() {
            if (musicInterval) return;
            
            musicInterval = setInterval(() => {
                if (gameState !== "PLAYING" || isSettingOpen || isTipsOpen || musicVolume === 0) return;
                
                try {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    
                    osc.type = 'square'; 
                    osc.frequency.setValueAtTime(melody[melodyIndex], audioCtx.currentTime);
                    melodyIndex = (melodyIndex + 1) % melody.length;
                    
                    gain.gain.setValueAtTime(musicVolume * 0.4, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                } catch(e){}
            }, 220); 
        }

        function stopMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
        }

        function playCrashSound() {
            if (sfxVolume === 0) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.7);
                gain.gain.setValueAtTime(sfxVolume * 0.6, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.7);
            } catch(e){}
        }

        const keys = { ArrowLeft: false, ArrowRight: false };

        window.addEventListener("keydown", (e) => {
            if (gameState === "PLAYING" && !isSettingOpen && !isTipsOpen && e.key in keys) {
                keys[e.key] = true;
            }
            if (gameState === "GAMEOVER" && e.key === "1") {
                resetGame();
                gameState = "PLAYING";
                startEngineSound();
                startMusic();
            }
        });

        window.addEventListener("keyup", (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (gameState !== "CUSTOM" && !isTipsOpen && mouseX >= canvas.width - 50 && mouseX <= canvas.width - 10 && mouseY >= 10 && mouseY <= 50) {
                isSettingOpen = !isSettingOpen;
                if (isSettingOpen) stopEngineSound();
                else if (gameState === "PLAYING") startEngineSound();
                return;
            }

            if (gameState !== "CUSTOM" && !isSettingOpen && mouseX >= canvas.width - 95 && mouseX <= canvas.width - 55 && mouseY >= 10 && mouseY <= 50) {
                isTipsOpen = !isTipsOpen;
                if (isTipsOpen) stopEngineSound();
                else if (gameState === "PLAYING") startEngineSound();
                return;
            }

            if (isTipsOpen) {
                if (mouseX >= 150 && mouseX <= 300 && mouseY >= 410 && mouseY <= 455) {
                    isTipsOpen = false;
                    if (gameState === "PLAYING") startEngineSound();
                }
                return;
            }

            if (isSettingOpen) {
                if (mouseX >= 60 && mouseX <= 380 && mouseY >= 215 && mouseY <= 245) {
                    let clickedPct = (mouseX - 60) / 320;
                    musicVolume = Math.max(0, Math.min(1, clickedPct)); 
                }
                if (mouseX >= 60 && mouseX <= 380 && mouseY >= 315 && mouseY <= 345) {
                    let clickedPct = (mouseX - 60) / 320;
                    sfxVolume = Math.max(0, Math.min(1, clickedPct));
                    updateEngineVolume();
                    if (sfxVolume === 0) stopEngineSound();
                }
                if (mouseX >= 150 && mouseX <= 300 && mouseY >= 430 && mouseY <= 475) {
                    isSettingOpen = false;
                    if (gameState === "PLAYING") startEngineSound();
                }
                return;
            }

            if (gameState === "LOBBY") {
                if (mouseX >= 125 && mouseX <= 325 && mouseY >= 310 && mouseY <= 360) {
                    resetGame();
                    gameState = "PLAYING";
                    startEngineSound();
                    startMusic();
                }
                if (mouseX >= 125 && mouseX <= 325 && mouseY >= 390 && mouseY <= 440) {
                    gameState = "CUSTOM";
                }
            } 
            else if (gameState === "CUSTOM") {
                if (mouseX >= 70 && mouseX <= 130 && mouseY >= 260 && mouseY <= 310) {
                    selectedColorIndex = (selectedColorIndex - 1 + colorOptions.length) % colorOptions.length;
                    player.color = colorOptions[selectedColorIndex].hex;
                }
                if (mouseX >= 320 && mouseX <= 380 && mouseY >= 260 && mouseY <= 310) {
                    selectedColorIndex = (selectedColorIndex + 1) % colorOptions.length;
                    player.color = colorOptions[selectedColorIndex].hex;
                }
                if (mouseX >= 125 && mouseX <= 325 && mouseY >= 470 && mouseY <= 520) {
                    gameState = "LOBBY";
                }
            }
            else if (gameState === "GAMEOVER") {
                if (mouseX >= 125 && mouseX <= 325 && mouseY >= 410 && mouseY <= 455) {
                    gameState = "LOBBY";
                }
            }
        });

        function resetGame() {
            player.x = 200;
            player.y = 460;
            enemy.x = Math.random() * (canvas.width - 50);
            enemy.y = -90;
            enemy.speed = 4;
            roadSpeed = 6;
            score = 0;
            isSettingOpen = false;
            isTipsOpen = false;
        }

        function update() {
            if (gameState !== "PLAYING" || isSettingOpen || isTipsOpen) return;

            roadOffset = (roadOffset + roadSpeed) % 70;

            updateEnginePitch();

            if (keys.ArrowLeft && player.x > 10) player.x -= player.speed;
            if (keys.ArrowRight && player.x < canvas.width - player.width - 10) player.x += player.speed;

            enemy.y += enemy.speed;

            if (enemy.y > canvas.height) {
                enemy.y = -90;
                enemy.x = Math.random() * (canvas.width - enemy.width);
                score++;
                enemy.speed += 0.4;
                roadSpeed += 0.4; 
            }

            if (
                player.x < enemy.x + enemy.width &&
                player.x + player.width > enemy.x &&
                player.y < enemy.y + enemy.height &&
                player.y + player.height > enemy.y
            ) {
                gameState = "GAMEOVER";
                stopEngineSound();
                stopMusic();
                playCrashSound();
            }
        }

        function drawCar(car, isPlayer) {
            ctx.fillStyle = "#111"; 
            ctx.fillRect(car.x - 4, car.y + 10, 4, 18);  
            ctx.fillRect(car.x + car.width, car.y + 10, 4, 18); 
            ctx.fillRect(car.x - 4, car.y + car.height - 25, 4, 18); 
            ctx.fillRect(car.x + car.width, car.y + car.height - 25, 4, 18); 

            ctx.fillStyle = car.color;
            ctx.fillRect(car.x, car.y, car.width, car.height);

            ctx.fillStyle = (car.color === "#f5f6fa") ? "#7f8c8d" : "#dcdde1"; 
            
            if (isPlayer) {
                ctx.fillRect(car.x + 5, car.y + 25, car.width - 10, 12); 
                ctx.fillRect(car.x + 8, car.y + car.height - 15, car.width - 16, 6); 
                ctx.fillStyle = "#fbc531";
                ctx.fillRect(car.x + 6, car.y, 10, 5);
                ctx.fillRect(car.x + car.width - 16, car.y, 10, 5);
            } else {
                ctx.fillRect(car.x + 5, car.y + car.height - 37, car.width - 10, 12); 
                ctx.fillRect(car.x + 8, car.y + 9, car.width - 16, 6); 
                ctx.fillStyle = "#fbc531";
                ctx.fillRect(car.x + 6, car.y + car.height - 5, 10, 5);
                ctx.fillRect(car.x + car.width - 16, car.y + car.height - 5, 10, 5);
            }
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(car.x + 5, car.y + 45, car.width - 10, 15);
        }

        function drawActionButtons() {
            if (gameState === "CUSTOM") return;
            
            ctx.fillStyle = "#444";
            ctx.fillRect(canvas.width - 50, 10, 40, 40);
            ctx.fillStyle = "#fff";
            ctx.font = "22px Arial";
            ctx.fillText("⚙️", canvas.width - 43, 38);

            ctx.fillStyle = "#444";
            ctx.fillRect(canvas.width - 95, 10, 40, 40);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 20px Arial";
            ctx.fillText("❓", canvas.width - 86, 37);
        }

        function drawSettingMenu() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.93)";
            ctx.fillRect(30, 80, canvas.width - 60, 430);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.strokeRect(30, 80, canvas.width - 60, 430);

            ctx.fillStyle = "#fbc531";
            ctx.font = "bold 26px Arial";
            ctx.fillText("SETTINGS", canvas.width / 2 - 65, 130);

            ctx.fillStyle = "#fff";
            ctx.font = "18px Arial";
            ctx.fillText(`Soundtrack Music: ${Math.round(musicVolume * 100)}%`, 60, 195);
            
            ctx.fillStyle = "#555"; 
            ctx.fillRect(60, 220, 320, 14);
            ctx.fillStyle = "#00a8ff"; 
            ctx.fillRect(60, 220, 320 * musicVolume, 14);
            ctx.fillStyle = "#fff"; 
            ctx.fillRect(60 + (320 * musicVolume) - 6, 214, 12, 26);

            ctx.fillStyle = "#fff";
            ctx.font = "18px Arial";
            ctx.fillText(`Engine Sound SFX: ${Math.round(sfxVolume * 100)}%`, 60, 295);
            
            ctx.fillStyle = "#555";
            ctx.fillRect(60, 320, 320, 14);
            ctx.fillStyle = "#2ecc71"; 
            ctx.fillRect(60, 320, 320 * sfxVolume, 14);
            ctx.fillStyle = "#fff";
            ctx.fillRect(60 + (320 * sfxVolume) - 6, 314, 12, 26);

            ctx.fillStyle = "#7f8c8d";
            ctx.fillRect(150, 430, 150, 45);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px Arial";
            ctx.fillText("CLOSE", 198, 458);
        }

        function drawTipsMenu() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.95)";
            ctx.fillRect(40, 110, canvas.width - 80, 370);
            ctx.strokeStyle = "#fbc531";
            ctx.lineWidth = 3;
            ctx.strokeRect(40, 110, canvas.width - 80, 370);

            ctx.fillStyle = "#fbc531";
            ctx.font = "bold 26px Arial";
            ctx.fillText("DRIVING TIPS", canvas.width / 2 - 85, 160);

            ctx.fillStyle = "#fff";
            ctx.font = "16px Arial";
            ctx.fillText("How to control your car:", 65, 220);

            ctx.font = "15px Arial";
            ctx.fillText("• Press Left Arrow (◀) to steer left.", 65, 265);
            ctx.fillText("• Press Right Arrow (▶) to steer right.", 65, 300);
            ctx.fillStyle = "#aaa";
            ctx.fillText("Avoid crashing into incoming enemy", 65, 350);
            ctx.fillText("cars to keep your score streak alive!", 65, 372);

            ctx.fillStyle = "#fbc531";
            ctx.fillRect(150, 410, 150, 45);
            ctx.fillStyle = "#111";
            ctx.font = "bold 16px Arial";
            ctx.fillText("CLOSE", 198, 438);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#fff";
            ctx.setLineDash([40, 30]); 
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.lineDashOffset = -roadOffset; 
            ctx.moveTo(canvas.width / 2, 0); 
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            if (gameState === "LOBBY") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#fbc531";
                ctx.font = "bold 44px Arial";
                ctx.fillText("RETRO RACER", canvas.width / 2 - 152, 220); 

                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(125, 310, 200, 50); 
                ctx.fillStyle = "#fff";
                ctx.font = "bold 22px Arial";
                ctx.fillText("PLAY", 195, 342);

                ctx.fillStyle = "#00a8ff";
                ctx.fillRect(125, 390, 200, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px Arial";
                ctx.fillText("CUSTOMISE", 165, 422);
            } 
            
            else if (gameState === "CUSTOM") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#fff";
                ctx.font = "bold 32px Arial";
                ctx.fillText("CUSTOMISE CAR", canvas.width / 2 - 135, 150);

                let previewCar = { x: 200, y: 230, width: 50, height: 85, color: player.color };
                drawCar(previewCar, true);

                ctx.fillStyle = "#555";
                ctx.fillRect(70, 260, 60, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 25px Arial";
                ctx.fillText("◀", 88, 295);

                ctx.fillStyle = "#555";
                ctx.fillRect(320, 260, 60, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 25px Arial";
                ctx.fillText("▶", 338, 295);

                ctx.fillStyle = colorOptions[selectedColorIndex].hex;
                ctx.font = "bold 24px Arial";
                let colorName = colorOptions[selectedColorIndex].name;
                let textWidth = ctx.measureText(colorName).width;
                ctx.fillText(colorName, canvas.width / 2 - (textWidth / 2), 370);

                ctx.font = "14px Arial";
                ctx.fillStyle = "#aaa";
                ctx.fillText("Click grey buttons to change color", canvas.width / 2 - 110, 410);

                ctx.fillStyle = "#e84118";
                ctx.fillRect(125, 470, 200, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText("BACK TO MENU", 157, 501);
            } 
            
            else if (gameState === "PLAYING") {
                drawCar(player, true);
                drawCar(enemy, false);

                ctx.fillStyle = "#fff";
                ctx.font = "bold 22px Arial";
                ctx.fillText("Score: " + score, 20, 40); 
            } 
            
            else if (gameState === "GAMEOVER") {
                drawCar(player, true);
                drawCar(enemy, false);

                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#e84118";
                ctx.font = "bold 40px Arial";
                ctx.fillText("GAME OVER", canvas.width / 2 - 120, canvas.height / 2 - 50);
                
                ctx.fillStyle = "#fff";
                ctx.font = "20px Arial";
                ctx.fillText("Total Score: " + score, canvas.width / 2 - 65, canvas.height / 2 - 5);
                
                ctx.fillStyle = "#fbc531";
                ctx.font = "bold 20px Arial";
                ctx.fillText("Press [ 1 ] To Play Again", canvas.width / 2 - 110, canvas.height / 2 + 50);

                ctx.fillStyle = "#e67e22"; 
                ctx.fillRect(125, 410, 200, 45);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Arial";
                ctx.fillText("BACK TO LOBBY", 162, 438);
            }

            drawActionButtons();

            if (isSettingOpen) {
                drawSettingMenu();
            } else if (isTipsOpen) {
                drawTipsMenu();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
